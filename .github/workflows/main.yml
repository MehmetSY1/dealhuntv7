name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Fix missing files
        run: |
          # gradle.properties
          printf 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8\nandroid.useAndroidX=true\nandroid.enableJetifier=true\nkotlin.code.style=official\n' > DealHuntV2/gradle.properties

          # settings.gradle
          cat > DealHuntV2/settings.gradle << 'SETTINGS'
          pluginManagement {
              repositories {
                  google { content { includeGroupByRegex("com\\.android.*"); includeGroupByRegex("com\\.google.*"); includeGroupByRegex("androidx.*") } }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DealHunt"
          include ':app'
          SETTINGS

          # build.gradle
          printf 'plugins {\n    id "com.android.application" version "8.2.2" apply false\n    id "org.jetbrains.kotlin.android" version "1.9.22" apply false\n}\n' > DealHuntV2/build.gradle

          # AndroidManifest
          mkdir -p DealHuntV2/app/src/main
          cat > DealHuntV2/app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="DealHunt"
                  android:theme="@style/Theme.DealHunt">
                  <activity android:name=".ui.MainActivity" android:exported="true" android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".ui.DetailActivity" android:exported="false" android:parentActivityName=".ui.MainActivity"/>
              </application>
          </manifest>
          MANIFEST

          # Tema (styles.xml)
          mkdir -p DealHuntV2/app/src/main/res/values
          cat > DealHuntV2/app/src/main/res/values/styles.xml << 'STYLES'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="Theme.DealHunt" parent="Theme.MaterialComponents.DayNight.NoActionBar">
                  <item name="colorPrimary">#00E5A0</item>
                  <item name="colorPrimaryVariant">#00E5A0</item>
                  <item name="colorOnPrimary">#0A0C10</item>
                  <item name="android:colorBackground">#0A0C10</item>
                  <item name="colorSurface">#12151C</item>
                  <item name="colorOnSurface">#F0F2F5</item>
                  <item name="android:statusBarColor">#0A0C10</item>
                  <item name="android:navigationBarColor">#0A0C10</item>
                  <item name="android:windowLightStatusBar">false</item>
              </style>
          </resources>
          STYLES

          # Mipmap ikonlar
          for dir in mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p DealHuntV2/app/src/main/res/$dir
            cat > DealHuntV2/app/src/main/res/$dir/ic_launcher.xml << 'ICON'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          ICON
            cp DealHuntV2/app/src/main/res/$dir/ic_launcher.xml DealHuntV2/app/src/main/res/$dir/ic_launcher_round.xml
          done

          # Launcher arka plan rengi
          cat >> DealHuntV2/app/src/main/res/values/styles.xml << 'COLORS'
          <!-- launcher color added separately -->
          COLORS

          # Basit ic_launcher_background color
          mkdir -p DealHuntV2/app/src/main/res/values
          cat > DealHuntV2/app/src/main/res/values/ic_launcher_background.xml << 'LAUNCHERBG'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#0A0C10</color>
          </resources>
          LAUNCHERBG

          # ic_launcher_foreground drawable
          mkdir -p DealHuntV2/app/src/main/res/drawable
          cat > DealHuntV2/app/src/main/res/drawable/ic_launcher_foreground.xml << 'FGICON'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#00E5A0"
                  android:pathData="M54,18 L68,42 L94,42 L74,58 L82,82 L54,66 L26,82 L34,58 L14,42 L40,42 Z"/>
          </vector>
          FGICON

          echo "=== Kontrol ==="
          ls -la DealHuntV2/app/src/main/res/

      - name: Download fonts
        run: |
          mkdir -p DealHuntV2/app/src/main/res/font
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/rajdhani/Rajdhani-Bold.ttf" -o DealHuntV2/app/src/main/res/font/rajdhani_bold.ttf
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/rajdhani/Rajdhani-SemiBold.ttf" -o DealHuntV2/app/src/main/res/font/rajdhani_semibold.ttf
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/dmsans/DMSans%5Bopsz%2Cwght%5D.ttf" -o DealHuntV2/app/src/main/res/font/dm_sans_regular.ttf

      - name: Setup Gradle wrapper
        working-directory: DealHuntV2
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export PATH=/tmp/gradle-dist/gradle-8.4/bin:$PATH
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK
        working-directory: DealHuntV2
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: DealHunt-APK
          path: DealHuntV2/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
