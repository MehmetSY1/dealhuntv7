name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Fix missing files
        run: |
          # gradle.properties
          cat > DealHuntV2/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF

          # settings.gradle
          cat > DealHuntV2/settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google { content { includeGroupByRegex("com\\.android.*"); includeGroupByRegex("com\\.google.*"); includeGroupByRegex("androidx.*") } }
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DealHunt"
          include ':app'
          EOF

          # build.gradle
          cat > DealHuntV2/build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          # AndroidManifest.xml
          mkdir -p DealHuntV2/app/src/main
          cat > DealHuntV2/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:label="DealHunt"
                  android:theme="@style/Theme.DealHunt">
                  <activity android:name=".ui.MainActivity" android:exported="true" android:windowSoftInputMode="adjustResize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".ui.DetailActivity" android:exported="false" android:parentActivityName=".ui.MainActivity"/>
              </application>
          </manifest>
          EOF

          echo "=== Kontrol ==="
          ls -la DealHuntV2/
          ls -la DealHuntV2/app/src/main/

      - name: Download fonts
        run: |
          mkdir -p DealHuntV2/app/src/main/res/font
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/rajdhani/Rajdhani-Bold.ttf" -o DealHuntV2/app/src/main/res/font/rajdhani_bold.ttf
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/rajdhani/Rajdhani-SemiBold.ttf" -o DealHuntV2/app/src/main/res/font/rajdhani_semibold.ttf
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/dmsans/DMSans%5Bopsz%2Cwght%5D.ttf" -o DealHuntV2/app/src/main/res/font/dm_sans_regular.ttf

      - name: Setup Gradle wrapper
        working-directory: DealHuntV2
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export PATH=/tmp/gradle-dist/gradle-8.4/bin:$PATH
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK
        working-directory: DealHuntV2
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: DealHunt-APK
          path: DealHuntV2/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
