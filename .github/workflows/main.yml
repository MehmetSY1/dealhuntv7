name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Check and fix structure
        run: |
          echo "=== Repo kok ==="
          ls -la
          echo "=== DealHuntV2 ici ==="
          ls -la DealHuntV2/ 2>/dev/null || echo "KLASOR YOK"

          # settings.gradle yoksa olustur
          if [ ! -f "DealHuntV2/settings.gradle" ]; then
            echo "settings.gradle BULUNAMADI - olusturuluyor..."
            cat > DealHuntV2/settings.gradle << 'GRADLE'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "DealHunt"
          include ':app'
          GRADLE
          fi

          # build.gradle yoksa olustur
          if [ ! -f "DealHuntV2/build.gradle" ]; then
            echo "build.gradle BULUNAMADI - olusturuluyor..."
            cat > DealHuntV2/build.gradle << 'GRADLE'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          GRADLE
          fi

          echo "=== Sonuc ==="
          ls -la DealHuntV2/

      - name: Download fonts
        run: |
          mkdir -p DealHuntV2/app/src/main/res/font
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/rajdhani/Rajdhani-Bold.ttf" -o DealHuntV2/app/src/main/res/font/rajdhani_bold.ttf
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/rajdhani/Rajdhani-SemiBold.ttf" -o DealHuntV2/app/src/main/res/font/rajdhani_semibold.ttf
          curl -fL "https://github.com/google/fonts/raw/refs/heads/main/ofl/dmsans/DMSans%5Bopsz%2Cwght%5D.ttf" -o DealHuntV2/app/src/main/res/font/dm_sans_regular.ttf

      - name: Setup Gradle wrapper
        working-directory: DealHuntV2
        run: |
          wget -q "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          export PATH=/tmp/gradle-dist/gradle-8.4/bin:$PATH
          gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK
        working-directory: DealHuntV2
        run: ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: DealHunt-APK
          path: DealHuntV2/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
